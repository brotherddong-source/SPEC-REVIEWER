document.getElementById('dlCorrWordBtn').addEventListener('click', downloadCorrectedSpec);

// 위치 문자열에서 모든 K-#### ID 추출 (단일·범위·복수 모두 처리)
// 예) 'K-0023'          → ['K-0023']
//     'K-0023~K-0025'   → ['K-0023','K-0024','K-0025']
//     'K-0023, K-0027'  → ['K-0023','K-0027']
function extractSegIds(segIdStr) {
  if (!segIdStr) return [];
  // 범위: K-NNNN ~ K-MMMM (구분자 ~, -, –)
  const rangeM = segIdStr.match(/K-(\d+)\s*[~\-–]\s*K-(\d+)/);
  if (rangeM) {
    const start = parseInt(rangeM[1], 10);
    const end   = parseInt(rangeM[2], 10);
    const ids = [];
    for (let n = start; n <= end; n++) ids.push(`K-${String(n).padStart(4, '0')}`);
    return ids;
  }
  // 단일 또는 쉼표 구분 복수
  return (segIdStr.match(/K-\d+/g) || []).map(id => {
    const n = parseInt(id.slice(2), 10);
    return `K-${String(n).padStart(4, '0')}`;
  });
}

function downloadCorrectedSpec() {
  if (!segments.length) { alert('파일을 먼저 업로드해주세요.'); return; }

  // 세그먼트 텍스트를 가변 맵으로 관리 (segId → 현재 텍스트)
  const textMap = new Map(segments.map(s => [s.id, s.text]));

  corrections.forEach(c => {
    if (c.useOriginal) return;

    const orig = (c.original  || '').trim();
    const sugg = (c.suggestion|| '').trim();
    if (!sugg) return;

    // 부분 교체 시도. allowFull=true 이면 부분 매칭 실패 시 전체 교체
    const applyTo = (id, allowFull) => {
      const cur = textMap.get(id);
      if (cur === undefined) return false;
      if (orig && cur.includes(orig)) {
        textMap.set(id, cur.replace(orig, sugg));
        return true;
      }
      if (allowFull) {
        // 원문 구절이 세그먼트에 없고 단일 대상일 때만 전체 교체
        // (AI가 문장 전체를 수정제안으로 제시한 경우)
        textMap.set(id, sugg);
        return true;
      }
      return false;
    };

    const segIds = extractSegIds(c.segId);

    if (segIds.length > 0) {
      // 범위/복수: 각 세그먼트에 부분 교체 시도
      // 단일 segId이고 부분 매칭 실패 시에만 전체 교체 허용
      let applied = false;
      for (const sid of segIds) {
        if (applyTo(sid, false)) applied = true;
      }
      if (!applied && segIds.length === 1) {
        applyTo(segIds[0], true);
      }
    } else {
      // segId 없음 → 전체 세그먼트 스캔하여 원문 구절 발견 시 교체
      for (const s of segments) {
        if (orig && textMap.get(s.id)?.includes(orig)) {
          applyTo(s.id, false);
          break;
        }
      }
    }
  });

  // Word HTML 생성 (줄번호/세그먼트 ID 없이)
  const bodyHtml = segments.map(s => `<p>${esc(textMap.get(s.id) || s.text)}</p>`).join('\n');
  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
  <style>
    body { font-family: 'Malgun Gothic','Noto Sans KR',sans-serif; font-size: 11pt; line-height: 1.85;
           margin-top: 2.5cm; margin-bottom: 2.5cm; margin-left: 0; margin-right: 0; }
    p { margin: 2px 0; }
  </style></head><body>${bodyHtml}</body></html>`;

  const baseName = uploadedFileName || '명세서';
  const blob = htmlDocx.asBlob(html);
  const url  = URL.createObjectURL(blob);
  Object.assign(document.createElement('a'), { href: url, download: `${baseName}_수정본.docx` }).click();
  URL.revokeObjectURL(url);
}

// ══════════════════════════════════════════════
//  ZIP 저장 (세그먼트 MD + 검수결과 MD 묶음)
// ══════════════════════════════════════════════
document.getElementById('dlZipBtn').addEventListener('click', async function () {
  this.classList.remove('zip-ready');
  if (!segments.length) return;
  const zip  = new JSZip();
  const first = segments[0].id;
  const last  = segments[segments.length - 1].id;

  // ① 세그먼트 MD
  const segMd = segments.map(s => `[${s.id}] ${s.text}`).join('\n');
  zip.file(`segments_${first}~${last}.md`, segMd);

  // ② 검수결과 MD
  if (resultMarkdown) {
    zip.file('검수결과.md', resultMarkdown);
  }

  const blob = await zip.generateAsync({ type: 'blob' });
  const url  = URL.createObjectURL(blob);
  Object.assign(document.createElement('a'), { href: url, download: `명세서검수_${first}~${last}.zip` }).click();
  URL.revokeObjectURL(url);
});

// ══════════════════════════════════════════════
//  검토결과 불러오기 (세그먼트 MD + 검수결과 MD)
// ══════════════════════════════════════════════
let importedSegText   = null;  // 세그먼트 MD 원문
let importedReviewText = null; // 검수결과 MD 원문

function updateImportBtn() {
  document.getElementById('importBtn').disabled = !(importedSegText && importedReviewText);

// 세그먼트 MD 파서: "[K-0001] 텍스트" 형식 → segments 배열
function parseSegmentMD(text) {
  const result = [];
  let inClaimSection = false;
  for (const raw of text.split(/\r?\n/)) {
    const m = raw.match(/^\[K-(\d+)\]\s*(.+)$/);
    if (!m) continue;
    const id  = `K-${m[1].padStart(4, '0')}`;
    const txt = m[2].trim();
    const isHeader = /^【.+】/.test(txt);
    if (isHeader) inClaimSection = /^【청구항|^【특허청구의\s*범위/.test(txt);
    const isClaim = inClaimSection || /^청구항\s*(제\s*)?\d+/.test(txt);
    result.push({ id, text: txt, isHeader, isClaim });
  }
  return result;
}

// 검수결과 MD → corrections 배열 (marked로 렌더 후 기존 파서 재사용)
function parseReviewMD(mdText) {
  const tmp = document.createElement('div');
  tmp.innerHTML = marked.parse(mdText);
  applyBoldInTables(tmp);
  return parseCorrectionTable(tmp);
}

// 파일 선택 핸들러
document.getElementById('segMdInput').addEventListener('change', function () {
  const file = this.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    importedSegText = e.target.result;
    const drop = document.getElementById('segMdDrop');
    drop.classList.add('loaded');
    document.getElementById('segMdStatus').textContent = file.name;
    updateImportBtn();
  };
  reader.readAsText(file, 'utf-8');
});

document.getElementById('reviewMdInput').addEventListener('change', function () {
  const file = this.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    importedReviewText = e.target.result;
    const drop = document.getElementById('reviewMdDrop');
    drop.classList.add('loaded');
    document.getElementById('reviewMdStatus').textContent = file.name;
    updateImportBtn();
  };
  reader.readAsText(file, 'utf-8');
});

document.getElementById('importBtn').addEventListener('click', () => {
  // 세그먼트 복원
  const importedSegs = parseSegmentMD(importedSegText);
  if (!importedSegs.length) { alert('세그먼트 MD 파일을 파싱할 수 없습니다.\n[K-0001] 형식인지 확인하세요.'); return; }
  segments = importedSegs;
  renderPreview(segments);
  document.getElementById('previewCard').style.display = 'block';
  document.getElementById('reviewBtn').disabled = false;
  document.getElementById('claimCheckBtn').disabled = false;

  // 수정 제안 복원
  corrections = parseReviewMD(importedReviewText);
  if (!corrections.length) { alert('검수결과 MD에서 수정 제안을 찾을 수 없습니다.\n표 형식(위치|원문|수정제안|근거)인지 확인하세요.'); return; }

  // 수정 패널 직행 (검수결과 탭 없음)
  document.getElementById('resultPlaceholder').style.display = 'none';
  document.getElementById('noTabTitle').style.display  = 'none';
  document.getElementById('tabBar').style.display      = 'flex';
  document.getElementById('tabReview').style.display   = 'none';
  document.getElementById('tabCorr').style.display     = '';
  document.getElementById('tabCorr').classList.add('tab-active');
  document.getElementById('tabReview').classList.remove('tab-active');
  document.getElementById('corrBtns').style.display    = 'flex';
  document.getElementById('resultBtns').style.display  = 'none';
  document.getElementById('countBadge').textContent    = `총 ${corrections.length}건`;
  document.getElementById('countBadge').style.display  = 'inline-block';
  viewMode   = 'correction';
  resultHTML = '';
  renderCorrectionPanel();
});

marked.setOptions({ breaks: true, gfm: true });
const resultContent = document.getElementById('resultContent');
</script>
