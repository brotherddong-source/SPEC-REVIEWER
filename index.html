<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>명세서 검사기</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <script src="https://unpkg.com/html-docx-js@0.3.1/dist/html-docx.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    :root {
      --primary:   #0ea5e9;
      --success:   #10b981;
      --danger:    #ef4444;
      --bg:        #f7f7f7;
      --card:      #ffffff;
      --border:    #e5e7eb;
      --text:      #212121;
      --muted:     #6b7280;
      --code-bg:   #f3f4f6;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; font-family: inherit; }
    body {
      font-family: sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.65;
      min-height: 100vh;
    }

    /* ── 전체 래퍼 ── */
    .app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    /* ── 헤더 ── */
    .app-header {
      background: #2B2D7B;
      border-bottom: none;
      padding: 0 28px;
      height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .header-left { display: flex; align-items: center; gap: 0; }
    .header-logo {
      display: flex; align-items: center;
      padding-right: 18px;
      border-right: 1px solid rgba(255,255,255,0.3);
      margin-right: 18px;
    }
    .header-logo img { height: 28px; width: auto; }
    .app-header h1 { font-size: 15px; font-weight: 700; color: #ffffff; letter-spacing: -0.3px; }
    .app-header p  { font-size: 11px; color: rgba(255,255,255,0.75); margin-top: 1px; }
    .status-badge {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: rgba(255,255,255,0.8);
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.4); flex-shrink: 0; }
    .dot.ok  { background: #34d399; }
    .dot.err { background: #f87171; }

    /* ── 2열 본문 ── */
    .body-split {
      display: grid;
      grid-template-columns: 380px 1fr;
      flex: 1;
      overflow: hidden;
    }
    @media (max-width: 768px) {
      .body-split { grid-template-columns: 1fr; overflow: auto; }
      .app { height: auto; overflow: auto; }
      .left-panel, .right-panel { height: auto; overflow: visible; }
    }

    /* ── 왼쪽 패널 ── */
    .left-panel {
      border-right: 1px solid var(--border);
      background: var(--card);
      display: flex; flex-direction: column;
      overflow-y: auto;
      padding: 20px;
      gap: 14px;
    }

    /* ── 오른쪽 패널 ── */
    .right-panel {
      display: flex; flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }
    .right-inner {
      flex: 1; overflow-y: auto;
      padding: 20px 24px;
    }

    /* ── 카드 ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 18px;
      box-shadow: 0 1px 4px rgba(0,0,0,.04);
    }
    .card-title {
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.07em; text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
      display: flex; align-items: center; gap: 6px;
    }

    /* ── 드롭존 ── */
    .dropzone {
      border: 2px dashed var(--border);
      border-radius: 8px;
      padding: 28px 16px;
      text-align: center;
      cursor: pointer;
      position: relative;
      transition: border-color .2s, background .2s;
    }
    .dropzone:hover, .dropzone.over { border-color: var(--primary); background: #f0f9ff; }
    .dropzone input { display: none; }
    .dz-icon  { font-size: 28px; margin-bottom: 8px; }
    .dz-label { color: var(--muted); font-size: 12px; }
    .dz-label strong { color: var(--primary); }
    .file-chip {
      display: flex; align-items: center; gap: 6px;
      margin-top: 8px; padding: 5px 10px;
      background: #f0fdf4; border: 1px solid #bbf7d0;
      border-radius: 6px; font-size: 8px;
    }
    .file-chip .fname { font-weight: 600; max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-chip .fsize { color: var(--muted); flex-shrink: 0; }

    /* ── 세그먼트 ── */
    .seg-stats { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
    .pill {
      padding: 2px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 700;
      background: #f0f9ff; color: var(--primary);
    }
    .pill.green  { background: #f0fdf4; color: var(--success); }
    .pill.yellow { background: #fefce8; color: #92400e; }
    .seg-list {
      max-height: 220px; overflow-y: auto;
      border: 1px solid var(--border); border-radius: 6px;
      font-family: sans-serif;
      font-size: 11px; line-height: 1.8;
    }
    .seg-row {
      display: flex; gap: 4px;
      padding: 2px 10px; border-bottom: 1px solid #f3f4f6;
    }
    .seg-row:last-child { border-bottom: none; }
    .seg-row:hover { background: #f9fafb; }
    .seg-id   { color: var(--primary); font-weight: 700; min-width: 68px; flex-shrink: 0; }
    .seg-txt  { color: var(--text); word-break: break-word; }
    .seg-row.hdr   .seg-txt { color: var(--success); font-weight: 700; }
    .seg-row.claim .seg-txt { color: #7c3aed; }
    .token-note { font-size: 11px; color: var(--muted); margin-top: 6px; }
    .token-warn { font-size: 11px; color: #92400e; margin-top: 6px; background: #fefce8; padding: 5px 10px; border-radius: 5px; border: 1px solid #fde68a; }

    /* ── 버튼 ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 10px 20px; border: none; border-radius: 7px;
      font-size: 13px; font-weight: 700; font-family: inherit;
      cursor: pointer; transition: background .15s, opacity .15s;
    }
    .btn-primary { background: var(--text); color: #fff; width: 100%; }
    .btn-primary:hover:not(:disabled) { background: #333; }
    .btn-primary:disabled { opacity: .4; cursor: not-allowed; }
    .btn-sm {
      padding: 5px 12px; font-size: 11px; font-weight: 600;
      background: var(--code-bg); color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-sm:hover { background: #e5e7eb; }

    /* ── 진행 ── */
    .progress-wrap { margin-top: 10px; }
    .progress-track { height: 3px; background: var(--code-bg); border-radius: 3px; overflow: hidden; margin-bottom: 6px; }
    .progress-fill  { height: 100%; background: var(--primary); border-radius: 3px; transition: width .3s; }
    .progress-lbl   { font-size: 11px; color: var(--muted); }

    /* ── 결과 패널 제목 ── */
    .result-header {
      padding: 14px 24px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--card);
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .result-header-title { font-size: 12px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--muted); }
    .result-btn-row { display: flex; gap: 6px; }

    /* ── 결과 내용 ── */
    .result-placeholder {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; color: var(--muted); font-size: 13px; gap: 10px;
      text-align: center; padding: 40px;
    }
    .result-placeholder .icon { font-size: 36px; opacity: .4; }
    #resultContent { font-size: 13px; line-height: 1.85; }
    #resultContent table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 12px; border: 1px solid #9ca3af; }
    #resultContent th {
      background: var(--code-bg); padding: 7px 12px;
      text-align: left; font-weight: 700; font-size: 11px;
      letter-spacing: 0.05em; text-transform: uppercase;
      border: 1px solid #9ca3af;
    }
    #resultContent td { padding: 6px 12px; border: 1px solid #9ca3af; vertical-align: top; }
    #resultContent tr:hover td { background: #f9fafb; }
    #resultContent h1, #resultContent h2, #resultContent h3 { margin: 16px 0 6px; font-size: 13px; letter-spacing: 0.05em; text-transform: uppercase; }
    #resultContent p   { margin: 5px 0; }
    #resultContent code { background: var(--code-bg); padding: 1px 5px; border-radius: 3px; font-family: sans-serif; font-size: 11px; }
    #resultContent pre  { background: var(--code-bg); padding: 12px; border-radius: 7px; overflow-x: auto; font-size: 11px; margin: 8px 0; }
    #resultContent ul, #resultContent ol { padding-left: 18px; margin: 5px 0; }

    /* ── 알림 ── */
    .msg-error { background: #fef2f2; border: 1px solid #fecaca; border-radius: 7px; padding: 10px 14px; font-size: 12px; color: var(--danger); }
    .msg-wait  { text-align: center; padding: 40px; color: var(--muted); font-size: 13px; }
    .spinner {
      display: inline-block; width: 15px; height: 15px;
      border: 2px solid #ddd; border-top-color: var(--primary);
      border-radius: 50%; animation: spin .7s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 모달 팝업 ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.45);
      z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .modal-box {
      background: #fff; border-radius: 12px;
      max-width: 960px; width: 100%; max-height: 90vh;
      display: flex; flex-direction: column;
      box-shadow: 0 20px 60px rgba(0,0,0,.2);
    }
    .modal-head {
      padding: 14px 20px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
    }
    .modal-head span { font-size: 13px; font-weight: 700; color: var(--text); }
    .modal-close { border: none; background: none; font-size: 20px; cursor: pointer; color: var(--muted); line-height: 1; padding: 0 4px; }
    .modal-close:hover { color: var(--text); }
    .modal-body { flex: 1; overflow-y: auto; padding: 20px 24px; font-size: 13px; line-height: 1.85; }
    .modal-body table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 12px; border: 1px solid #9ca3af; }
    .modal-body th { background: var(--code-bg); padding: 7px 12px; text-align: left; font-weight: 700; font-size: 11px; border: 1px solid #9ca3af; }
    .modal-body td { padding: 6px 12px; border: 1px solid #9ca3af; vertical-align: top; }
    .modal-body tr:hover td { background: #f9fafb; }
    .modal-body h1,.modal-body h2,.modal-body h3 { margin: 14px 0 6px; font-size: 13px; }
    .modal-body p { margin: 5px 0; }
    .modal-body code { background: var(--code-bg); padding: 1px 5px; border-radius: 3px; font-size: 11px; }

    /* ── 결과 건수 배지 ── */
    .count-badge {
      display: inline-block; padding: 2px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 700;
      background: #f0fdf4; color: var(--success); margin-left: 8px;
    }

    /* ── 청구항 기재불비 검사 버튼 ── */
    .btn-stop { background: #dc2626; color: #fff; width: 100%; margin-top: 6px; }
    .btn-stop:hover { background: #b91c1c; }
    .btn-claim { background: #7c3aed; color: #fff; width: 100%; margin-top: 8px; }
    .btn-claim:hover:not(:disabled) { background: #6d28d9; }
    .btn-claim:disabled { opacity: .4; cursor: not-allowed; }

    /* ── 청구항 검사 결과 ── */
    .claim-summary {
      background: #f5f3ff; border: 1px solid #ddd6fe; border-radius: 8px;
      padding: 12px 16px; margin-bottom: 16px; font-size: 12px;
      display: flex; gap: 16px; flex-wrap: wrap; align-items: center;
    }
    .claim-summary-title { font-weight: 700; color: #5b21b6; flex-shrink: 0; }
    .claim-err  { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; border-radius: 4px; padding: 2px 8px; font-weight: 700; font-size: 11px; }
    .claim-warn { background: #fffbeb; color: #d97706; border: 1px solid #fed7aa; border-radius: 4px; padding: 2px 8px; font-weight: 700; font-size: 11px; }
    .claim-ok   { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; border-radius: 4px; padding: 2px 8px; font-weight: 700; font-size: 11px; }

    /* ── 수정 패널 ── */
    .corr-header {
      background: #f0f9ff; border: 1px solid #bae6fd; border-radius: 8px;
      padding: 10px 16px; margin-bottom: 14px; font-size: 12px;
      display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    }
    .corr-wrap { overflow-x: auto; }
    .corr-table { width: 100%; border-collapse: collapse; font-size: 12px; table-layout: fixed; }
    .corr-table th {
      background: var(--code-bg); padding: 8px 10px; border: 1px solid #9ca3af;
      font-size: 11px; font-weight: 700; text-align: center;
    }
    .corr-table td { padding: 8px 10px; border: 1px solid #e5e7eb; vertical-align: top; line-height: 1.75; word-break: break-word; }
    .corr-table .col-no { width: 48px; text-align: center; color: var(--muted); font-size: 10px; font-weight: 700; white-space: nowrap; }
    .corr-table .col-orig { width: 28%; background: #fffbeb; }
    .corr-table .col-sugg { width: 30%; background: #f0fdf4; }
    .corr-table .col-toggle { width: 72px; text-align: center; vertical-align: middle; }
    .corr-table .col-reason { color: var(--muted); font-size: 11px; }
    .diff-del { background: #fecaca; color: #dc2626; border-radius: 2px; padding: 0 2px; text-decoration: line-through; }
    .diff-add { background: #bbf7d0; color: #15803d; border-radius: 2px; padding: 0 2px; font-weight: 600; }
    .corr-sugg-text { outline: none; cursor: text; min-height: 1.5em; border-radius: 3px; }
    .corr-sugg-text:hover { background: #dcfce7; }
    .corr-sugg-text:focus { background: #dcfce7; box-shadow: inset 0 0 0 2px #86efac; }
    .use-orig .col-sugg .corr-sugg-text { opacity: 0.3; pointer-events: none; }

    /* ── 탭 ── */
    .tab-bar {
      display: flex; align-items: center; gap: 0;
    }
    .tab-btn {
      padding: 0 18px; height: 100%; min-height: 47px;
      font-size: 12px; font-weight: 700; font-family: inherit;
      border: none; background: transparent; color: var(--muted);
      cursor: pointer; border-bottom: 2px solid transparent;
      margin-bottom: -1px; transition: color .15s, border-color .15s;
      white-space: nowrap;
    }
    .tab-btn:hover:not(.tab-active) { color: var(--text); }
    .tab-btn.tab-active { color: var(--primary); border-bottom-color: var(--primary); }

    /* ── ZIP 버튼 강조 ── */
    @keyframes zip-pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(124,58,237,.5); }
      50%      { box-shadow: 0 0 0 6px rgba(124,58,237,0); }
    }
    .zip-ready {
      animation: zip-pulse 1.2s ease infinite;
      background: #7c3aed !important; color: #fff !important;
      border-color: #7c3aed !important;
    }

    /* ── 검토결과 불러오기 ── */
    .dropzone-mini {
      border: 1.5px dashed var(--border); border-radius: 6px;
      padding: 7px 10px; cursor: pointer; position: relative;
      font-size: 11px; color: var(--muted); background: #fafafa;
      transition: border-color .15s, background .15s;
      display: flex; align-items: center; gap: 6px;
    }
    .dropzone-mini:hover { border-color: var(--primary); background: #f0f9ff; }
    .dropzone-mini input { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
    .dropzone-mini.loaded { border-color: var(--success); background: #f0fdf4; color: #15803d; font-weight: 700; }
    .import-label { font-size: 11px; font-weight: 700; display: block; margin-bottom: 4px; color: var(--text); }
    .toggle-sugg {
      display: inline-block; padding: 4px 7px; border-radius: 5px; cursor: pointer;
      font-size: 10px; font-weight: 700; white-space: nowrap; border: 1px solid #bbf7d0;
      background: #f0fdf4; color: #15803d; user-select: none;
    }
    .toggle-orig {
      display: inline-block; padding: 4px 7px; border-radius: 5px; cursor: pointer;
      font-size: 10px; font-weight: 700; white-space: nowrap; border: 1px solid #fde68a;
      background: #fffbeb; color: #92400e; user-select: none;
    }
    .use-orig .col-orig { background: #fef9c3; box-shadow: inset 0 0 0 2px #fbbf24; }
  </style>
</head>
<body>
<div class="app">

  <!-- 헤더 -->
  <header class="app-header">
    <div class="header-left">
      <div class="header-logo">
        <img src="/iplab-logo.png" alt="IP LAB" />
      </div>
      <div>
        <h1>명세서 검사기</h1>
        <p>Patent Specification Checker</p>
      </div>
    </div>
    <div class="status-badge">
      <span class="dot" id="statusDot"></span>
      <span id="statusText">연결 확인 중...</span>
    </div>
  </header>

  <!-- 2열 본문 -->
  <div class="body-split">

    <!-- 왼쪽: 업로드 + 세그먼트 + 실행 -->
    <div class="left-panel">

      <!-- 파일 업로드 -->
      <div class="card">
        <div class="card-title">Upload</div>
        <input type="file" id="fileInput" accept=".docx" style="display:none">
        <div class="dropzone" id="dropzone">
          <div class="dz-icon">📄</div>
          <div class="dz-label"><strong>Word 파일 (.docx) 클릭 또는 드래그</strong></div>
        </div>
        <div id="fileChip" style="display:none"></div>
        <div style="margin-top:12px">
          <button class="btn btn-primary" id="reviewBtn" disabled>검수 실행</button>
          <button class="btn btn-stop" id="stopBtn" style="display:none" onclick="stopReview()">⏹ 검수 중단</button>
          <div class="progress-wrap" id="progressWrap" style="display:none">
            <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
            <div class="progress-lbl" id="progressLbl"></div>
          </div>
          <button class="btn btn-claim" id="claimCheckBtn" disabled>청구항 기재불비 검사</button>
        </div>
      </div>

      <!-- 세그먼트 미리보기 -->
      <div class="card" id="previewCard" style="display:none">
        <div class="card-title">
          Segments
          <button class="btn btn-sm" id="toggleBtn" style="margin-left:auto">Hide</button>
        </div>
        <div id="segStats" class="seg-stats"></div>
        <div id="segList" class="seg-list"></div>
        <div id="tokenWarn"></div>
        <div style="margin-top:10px">
          <button class="btn btn-sm" id="dlSegBtn">↓ 세그먼트 MD</button>
        </div>
      </div>

      <!-- 검토결과 불러오기 -->
      <div class="card" id="importCard">
        <div class="card-title">검토결과 불러오기</div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:10px">
          이전에 저장한 파일 2개를 업로드하면 수정 패널로 바로 진입합니다
        </div>
        <label class="import-label">① 세그먼트 MD</label>
        <div class="dropzone-mini" id="segMdDrop">
          <input type="file" id="segMdInput" accept=".md,.txt">
          <span>📄</span><span id="segMdStatus">segments.md 선택</span>
        </div>
        <label class="import-label" style="margin-top:8px">② 검수결과 MD</label>
        <div class="dropzone-mini" id="reviewMdDrop">
          <input type="file" id="reviewMdInput" accept=".md,.txt">
          <span>📋</span><span id="reviewMdStatus">검수결과.md 선택</span>
        </div>
        <button class="btn btn-primary" id="importBtn" disabled style="margin-top:10px">수정 패널 열기</button>
      </div>

    </div><!-- /left-panel -->

    <!-- 오른쪽: 결과 -->
    <div class="right-panel">
      <div class="result-header">
        <!-- 결과 없을 때 타이틀 -->
        <span class="result-header-title" id="noTabTitle">Review Result</span>
        <!-- 결과 있을 때 탭 -->
        <div class="tab-bar" id="tabBar" style="display:none">
          <button class="tab-btn tab-active" id="tabReview">검수결과</button>
          <button class="tab-btn" id="tabCorr" style="display:none">✏️ 수정 패널</button>
          <span class="count-badge" id="countBadge" style="display:none;margin-left:6px;align-self:center"></span>
        </div>
        <!-- 검수결과 탭 버튼 -->
        <div class="result-btn-row" id="resultBtns" style="display:none">
          <button class="btn btn-sm" id="copyBtn">Copy</button>
          <button class="btn btn-sm" id="dlMdBtn">↓ MD</button>
          <button class="btn btn-sm" id="dlWordBtn">↓ Word</button>

<script>
// ══════════════════════════════════════════════
//  서버 상태 확인
// ══════════════════════════════════════════════

// ══════════════════════════════════════════════
//  상태
// ══════════════════════════════════════════════
let segments = [];
let uploadedFileName = '';
let resultMarkdown = '';
let corrections  = [];   // 파싱된 수정 제안 목록
let resultHTML   = '';   // 검수 결과 HTML (패널 토글용 보관)

}

// ══════════════════════════════════════════════
//  드래그앤드롭 / 파일 선택
// ══════════════════════════════════════════════
const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');
dropzone.addEventListener('click', () => { fileInput.value = ''; fileInput.click(); });
dropzone.addEventListener('dragover',  e => { e.preventDefault(); dropzone.classList.add('over'); });
dropzone.addEventListener('dragleave', ()  => dropzone.classList.remove('over'));
dropzone.addEventListener('drop', e => { e.preventDefault(); dropzone.classList.remove('over'); if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); });

// FileReader 기반 ArrayBuffer 읽기 (file.arrayBuffer()보다 호환성 높음)
function readAsArrayBuffer(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = () => reject(reader.error);
    reader.readAsArrayBuffer(file);
  });
}

// JSZip fallback: .docx에서 텍스트 추출 (w:t 태그 또는 altChunk HTML)
async function extractTextViaJSZip(arrayBuffer) {
  const zip = await JSZip.loadAsync(arrayBuffer);

  // 1) 일반 docx: word/document.xml의 w:t 태그에서 추출
  const docXml = await zip.file('word/document.xml').async('string');
  const parser = new DOMParser();
  const doc = parser.parseFromString(docXml, 'application/xml');
  const ns = 'http://schemas.openxmlformats.org/wordprocessingml/2006/main';
  const paragraphs = doc.getElementsByTagNameNS(ns, 'p');
  const lines = [];
  for (const p of paragraphs) {
    const runs = p.getElementsByTagNameNS(ns, 't');
    let line = '';
    for (const r of runs) line += r.textContent;
    if (line.trim()) lines.push(line.trim());
  }
  if (lines.length > 0) return lines.join('\n');

  // 2) altChunk 방식: word/afchunk.mht 또는 유사 HTML 청크에서 추출
  for (const fileName of Object.keys(zip.files)) {
    if (/^word\/.*\.(mht|html?)$/i.test(fileName)) {
      let content = await zip.file(fileName).async('string');
      // MHT인 경우 quoted-printable 디코딩: =XX → 문자, =\n → 줄이음
      if (fileName.endsWith('.mht')) {
        const htmlMatch = content.match(/Content-Type:\s*text\/html[\s\S]*?\n\n([\s\S]+?)(?:\n------=|$)/i);
        if (htmlMatch) content = htmlMatch[1];
        content = content.replace(/=\r?\n/g, '').replace(/=([0-9A-Fa-f]{2})/g,
          (_, hex) => String.fromCharCode(parseInt(hex, 16)));
      }
      // HTML에서 텍스트 추출
      const tmp = document.createElement('div');
      tmp.innerHTML = content;
      const textContent = tmp.innerText || tmp.textContent || '';
      if (textContent.trim().length > 0) return textContent.trim();
    }
  }

  return '';
}

async function handleFile(file) {
  if (!file.name.toLowerCase().endsWith('.docx')) { alert('.docx 파일만 지원합니다.'); return; }
  uploadedFileName = file.name.replace(/\.docx$/i, '');

  const chip = document.getElementById('fileChip');
  chip.style.display = 'flex';
  chip.innerHTML = `<span>📄</span><span class="fname">${esc(file.name)}</span><span class="fsize">${(file.size/1024).toFixed(1)} KB</span>`;

  document.getElementById('previewCard').style.display = 'block';
  document.getElementById('segList').innerHTML = '<div style="padding:10px;color:var(--muted);font-size:12px">분석 중...</div>';
  document.getElementById('reviewBtn').disabled = true;

  try {
    const buf = await readAsArrayBuffer(file);

    // 1차: mammoth 시도
    let text = '';
    try {
      const result = await mammoth.extractRawText({ arrayBuffer: buf.slice(0) });
      text = result.value || '';
    } catch (_) {}

    // 2차: mammoth 실패 시 JSZip으로 직접 추출
    if (!text.trim()) {
      text = await extractTextViaJSZip(buf.slice(0));
    }

    segments = buildSegments(text);
    renderPreview(segments);
    if (segments.length > 0) {
      document.getElementById('reviewBtn').disabled = false;
      document.getElementById('claimCheckBtn').disabled = false;
    } else {
      document.getElementById('segList').innerHTML = '<div class="msg-error">텍스트를 추출할 수 없습니다. 문서 형식을 확인해주세요.</div>';
    }
  } catch (err) {
    document.getElementById('segList').innerHTML = `<div class="msg-error">파싱 오류: ${esc(err.message)}</div>`;
  }
}

// ══════════════════════════════════════════════
//  세그먼트 분리
//  ① 【식별항목】 → 독립 세그먼트(헤더)
//  ② 나머지 → 마침표 기준 문장 분리
//  ③ 【청구항 N】 / 【특허청구의 범위】 섹션 내부 → isClaim
// ══════════════════════════════════════════════
function buildSegments(text) {
  const result = [];
  let n = 1;
  let inClaimSection = false;

  for (const raw of text.split(/\r?\n/)) {
    const line = raw.trim();
    if (!line) continue;

    if (/^【.+】/.test(line)) {
      inClaimSection = /^【청구항|^【특허청구의\s*범위/.test(line);
      result.push({ id: `K-${String(n++).padStart(4,'0')}`, text: line, isHeader: true, isClaim: inClaimSection });
      continue;
    }

    const parts = line.split(/(?<=\.)\s+(?=[가-힣A-Za-z(①-⑳\d])/).map(s => s.trim()).filter(Boolean);
    for (const part of (parts.length ? parts : [line])) {
      result.push({ id: `K-${String(n++).padStart(4,'0')}`, text: part, isHeader: false, isClaim: inClaimSection || /^청구항\s*(제\s*)?\d+/.test(part) });
    }
  }
  return result;
}

// ══════════════════════════════════════════════
//  미리보기
// ══════════════════════════════════════════════
function renderPreview(segs) {
  const total = segs.length, headers = segs.filter(s=>s.isHeader).length, claims = segs.filter(s=>s.isClaim).length;
  document.getElementById('segStats').innerHTML =
    `<span class="pill">전체 ${total}</span><span class="pill green">헤더 ${headers}</span><span class="pill yellow">청구항 ${claims}</span><span class="pill">본문 ${total-headers-claims}</span>`;
  document.getElementById('segList').innerHTML = segs.map(s =>
    `<div class="seg-row${s.isHeader?' hdr':s.isClaim?' claim':''}"><span class="seg-id">[${s.id}]</span><span class="seg-txt">${esc(s.text)}</span></div>`
  ).join('');
  const est = Math.round(segs.map(s=>`[${s.id}] ${s.text}`).join('\n').length * 0.75);
  document.getElementById('tokenWarn').innerHTML = est > 90000
    ? `<div class="token-warn">⚠️ 추정 토큰 약 ${est.toLocaleString()}개 — 컨텍스트 초과 가능성</div>`
    : `<div class="token-note">추정 토큰: 약 ${est.toLocaleString()}개</div>`;
}

// ══════════════════════════════════════════════
//  청크 분할 (50,000자 기준 · 세그먼트 단위)
// ══════════════════════════════════════════════
function chunkSegments(segs, maxChars = 50000) {
  const chunks = [];
  let current = [], currentLen = 0;
  for (const seg of segs) {
    const line = `[${seg.id}] ${seg.text}\n`;
    if (currentLen + line.length > maxChars && current.length > 0) {
      chunks.push(current);
      current = [];
      currentLen = 0;
    }
    current.push(seg);
    currentLen += line.length;
  }
  if (current.length > 0) chunks.push(current);
  return chunks;
}

// ══════════════════════════════════════════════
//  검수 실행
// ══════════════════════════════════════════════
document.getElementById('reviewBtn').addEventListener('click', runReview);

async function runReview() {
  if (!segments.length) { alert('파일을 먼저 업로드해주세요.'); return; }

  const chunks = chunkSegments(segments);
  const total  = chunks.length;
  const rightInner = document.querySelector('.right-inner');

  reviewAbortController = new AbortController();
  document.getElementById('reviewBtn').disabled = true;
  document.getElementById('stopBtn').style.display = '';
  document.getElementById('progressWrap').style.display = 'block';
  document.getElementById('resultPlaceholder').style.display = 'none';
  document.getElementById('noTabTitle').style.display = '';
  document.getElementById('tabBar').style.display    = 'none';
  document.getElementById('tabCorr').style.display   = 'none';
  document.getElementById('tabReview').classList.add('tab-active');
  document.getElementById('tabCorr').classList.remove('tab-active');
  document.getElementById('resultBtns').style.display = 'none';
  document.getElementById('corrBtns').style.display   = 'none';
  document.getElementById('dlZipBtn').classList.remove('zip-ready');
  resultContent.innerHTML = '';
  resultMarkdown = '';
  corrections = [];
  resultHTML = '';
  viewMode = 'review';

  try {
    // ── 청크별 검수 ──
    for (let i = 0; i < total; i++) {
      const chunk   = chunks[i];
      const firstId = chunk[0].id;
      const lastId  = chunk[chunk.length - 1].id;

      setProgress(
        5 + Math.round((i / total) * 90),
        `청크 ${i+1}/${total} 검수 중... (${firstId} ~ ${lastId})`
      );

      // 청크별 독립 div — 청크 간 markdown 오염 방지
      const chunkDiv = document.createElement('div');
      resultContent.appendChild(chunkDiv);

      // 청크 구분 헤더 (복수 청크일 때만)
      if (total > 1) {
        const hdrDiv = document.createElement('div');
        hdrDiv.innerHTML = marked.parse(`---\n## 청크 ${i+1} / ${total} — ${firstId} ~ ${lastId}`);
        resultContent.insertBefore(hdrDiv, chunkDiv);
        resultMarkdown += `\n\n---\n## 청크 ${i+1} / ${total} — ${firstId} ~ ${lastId}\n\n`;
      }

      const chunkCtx = total > 1
        ? `[전체 ${total}개 청크 중 ${i+1}번째 | 범위: ${firstId} ~ ${lastId}]\n`
        : '';
      const userText = chunkCtx + chunk.map(s => `[${s.id}] ${s.text}`).join('\n');

      const chunkResult = await callAPI(userText, (live) => {
        chunkDiv.innerHTML = marked.parse(live);
        if (rightInner) rightInner.scrollTop = rightInner.scrollHeight;
      });

      chunkDiv.innerHTML = marked.parse(chunkResult);
      resultMarkdown += chunkResult + '\n\n';
    }

    applyBoldInTables(resultContent);
    addRowNumbers(resultContent);
    showReviewCount(resultContent);
    corrections = parseCorrectionTable(resultContent);
    resultHTML  = resultContent.innerHTML;
    viewMode    = 'review';
    // 탭 표시
    document.getElementById('noTabTitle').style.display = 'none';
    document.getElementById('tabBar').style.display     = 'flex';
    document.getElementById('resultBtns').style.display = 'flex';
    document.getElementById('dlZipBtn').classList.add('zip-ready');
    if (corrections.length > 0) {
      document.getElementById('tabCorr').style.display = '';
    }
    setProgress(100, `완료 ✅  (${total}개 청크)`);

  } catch (err) {
    if (err.name === 'AbortError') {
      resultContent.innerHTML += `<div class="msg-error">⏹ 검수가 중단되었습니다.</div>`;
      setProgress(0, '중단됨');
    } else {
      resultContent.innerHTML += `<div class="msg-error">❌ ${esc(err.message)}</div>`;
      setProgress(0, '오류');
    }
  } finally {
    reviewAbortController = null;
    document.getElementById('reviewBtn').disabled = false;
    document.getElementById('stopBtn').style.display = 'none';
  }
}

// ══════════════════════════════════════════════
//  /api/review 스트리밍 호출 (콜백 방식)
// ══════════════════════════════════════════════
async function callAPI(userText, onUpdate) {
  const signal = reviewAbortController?.signal;
  const resp = await fetch('/api/review', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ userText }),
    signal,
  });

  if (!resp.ok) {
    let msg = `HTTP ${resp.status}`;
    try { const e = await resp.json(); msg = e?.error?.message || e?.error || msg; } catch {}
    throw new Error(msg);
  }

  if (!(resp.headers.get('Content-Type') || '').includes('text/event-stream')) {
    const data = await resp.json();
    const text = data.choices?.[0]?.message?.content || '';
    onUpdate(text);
    return text;
  }

  const reader = resp.body.getReader(), decoder = new TextDecoder();
  let full = '', buffer = '';

  if (signal) signal.addEventListener('abort', () => reader.cancel());

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    if (signal?.aborted) throw new DOMException('Aborted', 'AbortError');
    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split('\n');
    buffer = lines.pop();
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const chunk = line.slice(6).trim();
      if (chunk === '[DONE]') continue;
      try {
        const delta = JSON.parse(chunk).choices?.[0]?.delta?.content ?? '';
        full += delta;
        onUpdate(full);
      } catch {}
    }
  }
  return full;
}

// ══════════════════════════════════════════════
//  테이블 셀 내 **text** → <strong>text</strong>
// ══════════════════════════════════════════════
function applyBoldInTables(container) {
  container.querySelectorAll('td').forEach(td => {
    if (td.innerHTML.includes('**')) {
      td.innerHTML = td.innerHTML.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    }
  });
}

// ══════════════════════════════════════════════
//  테이블 행번호 삽입
// ══════════════════════════════════════════════
function addRowNumbers(container) {
  let globalNum = 1;  // 전체 통합 일련번호
  container.querySelectorAll('table').forEach(table => {
    const headRow = table.querySelector('thead tr');
    if (headRow) {
      const th = document.createElement('th');
      th.textContent = '#';
      th.style.cssText = 'width:28px;text-align:center;';
      headRow.insertBefore(th, headRow.firstChild);
    }
    const bodyRows = table.querySelectorAll('tbody tr');
    const targets  = bodyRows.length
      ? Array.from(bodyRows)
      : Array.from(table.querySelectorAll('tr')).slice(1);
    targets.forEach(tr => {
      const td = document.createElement('td');
      td.textContent = globalNum++;
      td.style.cssText = 'text-align:center;color:var(--muted);font-size:10px;font-weight:700;white-space:nowrap;';
      tr.insertBefore(td, tr.firstChild);
    });
  });
}

// ══════════════════════════════════════════════
//  결과 건수 배지 + 카테고리별 요약 박스
// ══════════════════════════════════════════════
function showReviewCount(container) {
  const total = container.querySelectorAll('tbody tr').length;
  if (total === 0) return;

  // 카테고리별 집계 — 테이블 직전 헤더에서 [A]~[D] 추출
  const CAT_LABELS = { '[A]': '오탈자·조사·비문', '[B]': '용어 일관성', '[C]': '도면 부호', '[D]': '구조·참조' };
  const counts = {};
  container.querySelectorAll('table').forEach(table => {
    const rows = table.querySelectorAll('tbody tr').length;
    if (!rows) return;
    let cat = '기타';
    let el = table.previousElementSibling;
    while (el) {
      if (/^H[1-6]$/.test(el.tagName)) {
        const m = el.textContent.match(/\[([A-D])\]/);
        if (m) cat = `[${m[1]}]`;
        break;
      }
      el = el.previousElementSibling;
    }
    counts[cat] = (counts[cat] || 0) + rows;
  });

  // 배지
  const badge = document.getElementById('countBadge');
  badge.textContent = `총 ${total}건`;
  badge.style.display = 'inline-block';

  // 요약 박스 (기존 제거 후 재삽입)
  const old = document.getElementById('errorSummary');
  if (old) old.remove();

  const box = document.createElement('div');
  box.id = 'errorSummary';
  box.style.cssText = [
    'background:#f0f9ff', 'border:1px solid #bae6fd', 'border-radius:8px',
    'padding:10px 16px', 'margin-bottom:18px', 'font-size:12px',
    'display:flex', 'gap:18px', 'flex-wrap:wrap', 'align-items:center'
  ].join(';');

  let html = `<span style="font-weight:700;color:#0369a1;flex-shrink:0">검수 결과 요약</span>`;
  ['[A]', '[B]', '[C]', '[D]'].forEach(cat => {
    const n = counts[cat] || 0;
    const color = n > 0 ? '#0ea5e9' : '#9ca3af';
    html += `<span style="color:${color}">${cat} ${CAT_LABELS[cat]} <strong>${n}건</strong></span>`;
  });
  html += `<span style="margin-left:auto;font-weight:700;color:#0369a1">합계 ${total}건</span>`;
  box.innerHTML = html;
  container.insertBefore(box, container.firstChild);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function download(filename, content, mime) {
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(new Blob([content], {type:`${mime};charset=utf-8`})), download: filename
  });
  a.click(); URL.revokeObjectURL(a.href);
}

// ══════════════════════════════════════════════
// ══════════════════════════════════════════════
//  청구항 기재불비 검사 엔진 (기재굴비에서 이식)
// ══════════════════════════════════════════════
const ClaimChecker = (function() {
  const KOREAN_PARTICLES = [
    // 복합 조사 (3음절 이상, 긴 것 먼저)
    "으로부터", "에서부터", "으로서의", "으로서", "에서의", "으로의",
    "에게서", "한테서", "로부터", "로서의", "로서", "로의",
    "에서는", "에서도", "에서만", "으로는", "으로도", "으로만",
    "에게는", "에게도", "에게만",
    // 단일/기본 조사
    "이라도", "이든지", "이라는", "이라는", "이라고", "이라서",
    "이라는", "이라야", "이라면",
    "은", "는", "이", "가", "을", "를", "의", "에", "에서", "으로", "로",
    "와", "과", "만", "부터", "까지", "마저", "조차", "에게", "한테",
    // ✅ "도"(~도/also) 는 단독 조사에서 제거 — 특허 청구항에서는 거의 사용 안 되며,
    //    해상도·속도·유사도 등 기술 명사의 마지막 음절과 구분 불가능하기 때문.
    //    에서도·으로도 등 복합 조사는 위에서 처리됨.
    "께", "더러", "보다", "처럼", "같이", "커녕", "라도", "나마", "이나",
    "이라도", "이든지", "든지", "이라", "라", "이야", "야"
  ];

  // ✅ 불용어 목록 - 의미 없는 일반 단어들
  const STOPWORDS = new Set([
    "상기", "해당", "제1", "제2", "제3", "제4", "제5", "제6", "제7", "제8", "제9",
    "단계", "방법", "장치", "시스템", "있어서", "포함하는", "포함하고", "포함한",
    "활용하여", "활용한", "활용하는", "통해", "통하여", "의하여", "의해", "따라",
    "위한", "위하여", "대한", "대하여", "관한", "관하여", "있는", "없는",
    "하는", "되는", "수행하는", "실행하는", "제어하는", "기초로", "기반으로",
    "응답하여", "기초하여", "사용하여", "이용하여", "경우", "것", "때", "시",
    "특징으로", "특징으로하는", "수", "및", "또는", "그리고", "하나", "둘", "셋",
    "각각", "모두", "전부", "일부", "별도", "다른", "같은", "다양한"
  ]);


  // ✅ 조사로 끝나지만 실제로는 명사/부사인 단어 보호 목록 (조사 제거 금지)
  // ※ '도'로 끝나는 기술 명사(해상도·속도·유사도 등)는 KOREAN_PARTICLES에서 단독 "도"를
  //    제거하여 일괄 처리 — 이 목록에 넣을 필요 없음 (v2.0+)
  const STRIP_PROTECTED = new Set([
    // 끝 음절이 다른 조사로 오인식될 수 있는 부사/접속사
    '기껏해야',   // '야' → 기껏해  (매우 드물지만 보호)
  ]);

  // ✅ 조사 제거 함수
  function stripParticle(word) {
    if (!word) return "";
    if (STRIP_PROTECTED.has(word)) return word;
    for (const p of KOREAN_PARTICLES) {
      if (word.endsWith(p)) {
        const base = word.slice(0, -p.length);
        if (base.length > 0) return base;
      }
    }
    return word;
  }

  // ✅ 용어와 조사를 분리하는 함수
  function splitTermAndParticle(phrase) {
    if (!phrase) return { term: "", particle: "" };
    
    for (const p of KOREAN_PARTICLES) {
      if (phrase.endsWith(p)) {
        const term = phrase.slice(0, -p.length);
        if (term.length > 0) {
          return { term: term, particle: p };
        }
      }
    }
    return { term: phrase, particle: "" };
  }

  // [2] 예외처리: '중 적어도 하나', '중 어느 하나' 등을 조사처럼 취급하여 용어에서 제거
  function stripConnectorSuffix(term) {
    // '중 [수식어?] [선택어]' 패턴 일괄 제거
    // 수식어: 적어도, 어느 (optional)
    // 선택어: 하나, 둘, 셋, 일부, 전부, 모두, 것
    // 예) 중 하나, 중 적어도 하나, 중 어느 하나, 중 적어도 일부, 중 전부 등
    return term
      .replace(/\s*중\s+(?:적어도\s+|어느\s+)?(?:하나|둘|셋|일부|전부|모두|것)/g, '')
      .trim();
  }

  function parseClaims(text){
    const lines = text.split(/\n/);
    const arr = [];
    let cur = null;

    for(let ln of lines){
      ln = ln.trim();
      const m1 = ln.match(/^【청구항\s*(\d+)】(.*)$/);
      if(m1){
        if(cur) arr.push(cur);
        cur = { no:parseInt(m1[1],10), raw: m1[2] };
        continue;
      }
      const m2 = ln.match(/^(\d+)\.\s*(.*)$/);
      if(m2){
        if(cur) arr.push(cur);
        cur = { no:parseInt(m2[1],10), raw: m2[2] };
        continue;
      }
      if(cur){
        cur.raw += "\n" + ln;
      }
    }
    if(cur) arr.push(cur);
    return arr;
  }

  function extractDeps(raw){
    const deps = [];
    // 제N항 형식 또는 청구항 N에 있어서 형식 모두 인식
    const pat = /제\s*(\d+)\s*항|청구항\s*(\d+)/g;
    let m;
    while((m = pat.exec(raw))!==null){
      const no = parseInt(m[1] || m[2], 10);
      if(!deps.includes(no)) deps.push(no);
    }
    return deps.sort((a,b)=>a-b);
  }

  function closure(no, depsMap){
    const s = new Set();
    const q = [no];
    while(q.length){
      const x = q.shift();
      if(s.has(x)) continue;
      s.add(x);
      const arr = depsMap.get(x) || [];
      for(const p of arr) q.push(p);
    }
    s.delete(no);
    return Array.from(s).sort((a,b)=>a-b);
  }

  function topParent(no, closList){
    if(!closList || !closList.length) return null;
    return Math.min(...closList);
  }

  function extractSubject(raw){
    // 청구항 끝부분에서 발명의 대상 추출
    // 가장 마지막 "...을/를 특징으로 하는 X"를 찾아야 함
    
    // 방법 1: 마지막 "특징으로 하는" 찾기 (최우선)
    const featureIdx = raw.lastIndexOf('특징으로 하는');
    if(featureIdx >= 0){
      // "특징으로 하는" 이후 텍스트 추출
      const afterFeature = raw.substring(featureIdx + '특징으로 하는'.length).trim();
      // 마침표나 세미콜론까지
      const match = afterFeature.match(/^(.+?)(?:\.|;|$)/);
      if(match) return match[1].trim();
    }
    
    // 방법 2: "더 포함하는" 패턴
    const includeIdx = raw.lastIndexOf('더 포함하는');
    if(includeIdx >= 0){
      const afterInclude = raw.substring(includeIdx + '더 포함하는'.length).trim();
      // 쉼표 이후 또는 직후 텍스트
      let text = afterInclude;
      if(text.startsWith(',')){
        text = text.substring(1).trim();
      }
      const match = text.match(/^(.+?)(?:\.|;|$)/);
      if(match) return match[1].trim();
    }
    
    // 방법 3: "포함하는" 패턴
    const containsIdx = raw.lastIndexOf('포함하는');
    if(containsIdx >= 0){
      const afterContains = raw.substring(containsIdx + '포함하는'.length).trim();
      let text = afterContains;
      if(text.startsWith(',')){
        text = text.substring(1).trim();
      }
      const match = text.match(/^(.+?)(?:\.|;|$)/);
      if(match) return match[1].trim();
    }
    
    // 방법 4: 끝 문장에서 키워드 추출
    const sentences = raw.split(/[.;]/).filter(s => s.trim().length > 0);
    if(sentences.length === 0) return null;
    const lastSentence = sentences[sentences.length - 1].trim();
    
    const keywords = ['방법', '장치', '시스템', '프로그램', '매체', '제품', '디바이스', '장비', '기기'];
    for(const keyword of keywords){
      if(lastSentence.includes(keyword)){
        const idx = lastSentence.lastIndexOf(keyword);
        const start = Math.max(0, idx - 30);
        const extracted = lastSentence.substring(start, idx + keyword.length).trim();
        const commaIdx = extracted.lastIndexOf(',');
        if(commaIdx >= 0){
          return extracted.substring(commaIdx + 1).trim();
        }
        return extracted;
      }
    }
    
    return null;
  }

  function normMin(s){
    return (s||"").replace(/\s+/g,"").toLowerCase();
  }

  function extractCategory(raw){
    const s = raw.toLowerCase();
    if(s.includes("방법")) return "METHOD";
    if(s.includes("장치")) return "APPARATUS";
    if(s.includes("시스템")) return "SYSTEM";
    if(s.includes("제품")) return "PRODUCT";
    if(s.includes("컴퓨터") && s.includes("프로그램")) return "PROGRAM";
    if(s.includes("매체")) return "MEDIUM";
    return "UNKNOWN";
  }

  function buildLexicon(text){
    const lex = new Map();
    const lines = text.split(/\n/);
    for(const ln of lines){
      const words = ln.split(/\s+/);
      for(let w of words){
        w = w.trim();
        if(!w) continue;
        // ✅ 조사 제거하여 순수 명사만 저장
        const base = stripParticle(w);
        if (base.length > 0) {
          if(!lex.has(base)) lex.set(base, 0);
          lex.set(base, lex.get(base)+1);
        }
      }
    }
    return lex;
  }

  function appearsInLexicon(lex, phrase){
    // ✅ 조사 제거 후 비교
    const base = stripParticle(phrase);
    return lex.has(base);
  }

  function isInsideSubject(phrase, subj){
    if(!subj) return false;
    const base = stripParticle(phrase);
    return subj.includes(base);
  }

  function extractPhrases(txt){
    // ✅ 의미 없는 기능어만 제외
    const stopWords = new Set([
      "상기", "해당", "있어서", "포함하는", "단계", "것", "경우", "때", "위해",
      "통해", "기초로", "응답하여", "제공하는", "수행하는", "의해", "대한",
      "관한", "따른", "위한", "통한", "특징으로", "하는", "되는", "있는",
      "없는", "같은", "다른", "새로운", "기존", "전체", "일부", "각각",
      "모든", "어떤", "어느", "제1", "제2", "제3", "제4", "제5",
      "모두", "전부", "별도", "다양한"
    ]);
    
    // 조사를 제거한 단어들 추출
    const arr = txt.split(/\s+/);
    const result = [];
    
    for(let w of arr){
      const base = stripParticle(w.trim());
      
      // ✅ 3글자 이상 한글만 (너무 짧은 단어 제외)
      if(base.length >= 3 && /^[가-힣]+$/.test(base)){
        // 기능어 제외
        if(!stopWords.has(base)){
          result.push(base);
        }
      }
    }
    
    return result;
  }

  function extractDeicticRefs(txt){
    const arr = [];
    
    // ✅ 전처리: "및", "또는", "그리고"로 분리
    // "상기 A 및 B에" → ["상기 A", "B에"]로 분리하여 각각 처리
    const segments = txt.split(/\s+(및|또는|그리고)\s+/);
    
    let currentOffset = 0; // 현재 세그먼트의 원본 텍스트 내 위치
    
    // 분리된 각 세그먼트에 대해 정규식 적용
    for(let segment of segments){
      // 접속사 자체는 건너뛰되, offset은 업데이트
      if(segment === "및" || segment === "또는" || segment === "그리고") {
        currentOffset += segment.length + 2; // 접속사 + 앞뒤 공백
        continue;
      }
      
      // 정규식: 상기/해당 + 명사구 + 조사
      // 복합 조사(~의 계열) 최우선 매칭: 와의, 과의, 로의, 으로의, 에의, 에서의, 내의, 외의, 중의 등
      // "별" 접미사도 조사처럼 처리
      // "시" 추가 (시간/조건: 비상 상황 발생 시)
      // ※ '적어도'의 '도'를 조사로 오인식 방지: (?<!적어)도 (negative lookbehind)
      const regex = /(상기|해당)\s+([가-힣0-9\s]+?)(내의|외의|중의|와의|과의|으로의|로의|에의|에서의|로부터|에서부터|으로부터|에게서|한테서|에는|에도|로는|로도|와는|과는|별로|별|은|는|이|가|을|를|의|에|로|와|과|(?<!적어)도|만|까지|부터|에서|으로|시)(?![가-힣])/g;
      let m;
      
      while((m=regex.exec(segment))!==null){
        const deictic = m[1];
        let target = m[2].trim().replace(/\s+/g, ' ');
        // [2] 예외처리: '중 적어도 하나', '중 어느 하나' 등 조사처럼 취급
        target = stripConnectorSuffix(target);
        const particle = m[3] || "";
        
        // ✅ 관형사(과거분사형) 제거: ~된, ~한, ~하는, ~되는 등
        // "식별된 범주" → "범주", "선택된 영역" → "영역"
        const modifiers = /^(?:[가-힣]+(?:된|한|하는|되는)\s+)+/;
        target = target.replace(modifiers, '');
        
        // ✅ 불용어 제거 후 의미 있는 단어가 남아있는지 확인
        const words = target.split(' ').filter(w =>
          !STOPWORDS.has(w) && w.length >= 2 && /[가-힣]/.test(w)
        );

        // ✅ A의 B 패턴 처리: '상기 A의 B에서'에서 상기가 실제 참조하는 것은 A
        // '모델의' 처럼 '의'로 끝나는 토큰이 있으면 거기서 끊고 A 부분만 antecedent로 사용
        const uiIdx = words.findIndex(w => w.endsWith('의'));
        let cleanTarget;
        if (uiIdx >= 0) {
          const beforeUi = words.slice(0, uiIdx);
          const atUi = stripParticle(words[uiIdx]); // '모델의' → '모델'
          const parts = [...beforeUi, atUi].filter(w => w.length >= 2 && !STOPWORDS.has(w));
          cleanTarget = parts.length > 0 ? parts.join(' ') : words.join(' ');
        } else {
          cleanTarget = words.join(' ');
        }

        // 의미 있는 단어가 하나라도 있을 때만 추가
        if(words.length > 0){
          arr.push({
            deictic: deictic,
            target: target,  // 원본 그대로 (표시용)
            cleanTarget,     // A의 B → A 로 정규화된 버전 (비교용)
            evidence: `${deictic} ${target}${particle}`,
            position: currentOffset + m.index  // 원본 텍스트 내 위치
          });
        }
      }
      
      currentOffset += segment.length + 1; // 세그먼트 + 공백 1개
    }
    
    return arr;
  }

  function precededByDeictic(text, pos){
    if(pos<3) return false;
    const sub = text.substring(Math.max(0, pos-10), pos);
    return /(?:상기|해당)\s*$/.test(sub);
  }

  // ✅ 개선된 단일 토큰 위치 찾기 (조사 포함)
  function findSingleTokenPos(text, token){
    const base = stripParticle(token);
    const regex = new RegExp(base + "(?:" + KOREAN_PARTICLES.join("|") + ")?", "g");
    const m = regex.exec(text);
    return m ? m.index : -1;
  }

  // R7: 앞서 도입된 구성요소에 '상기' 누락 검사
  function checkMissingSanggi(raw) {
    const issues = [];

    // [2] 예외처리 적용 + 줄바꿈을 공백으로
    let text = stripConnectorSuffix(raw.replace(/\n/g, ' '));
    // ✅ 청구항 맺음말('특징으로 하는 X') 제거 — R7 분석 대상 아님
    //    예: '특징으로 하는 컴퓨터로 판독될 수 있는 기록매체에 저장된 프로그램'
    //    이 부분은 청구항 유형 선언이므로 본문 분석에서 제외
    const featureEndPos = text.lastIndexOf('특징으로 하는');
    if (featureEndPos >= 0) text = text.substring(0, featureEndPos);

    // 동사 어미 패턴 (과거분사 '된', 미래/명사형 '할' 포함)
    const VERB_ENDS = /(?:하는|하여|하고|하거나|되는|되어|되고|하며|위한|통한|의한|기반한|기초한|된|할)$/;

    // R7 전용 불용어
    const R7_STOP = new Set([
      '단계', '방법', '장치', '시스템', '경우', '것', '수', '때', '시',
      '특징', '발명', '청구항', '해당', '상기', '및', '또는', '그리고',
      '하나', '둘', '셋', '각각', '모든', '전체', '일부', '다른',
      '이를', '그것', '이것', '위해', '통해', '기반', '기초', '근거',
      '방식', '형태', '형식', '기준', '의해', '통하여', '의하여',
      '복수', '다수', '적어', '어느', '각', '여러',
      '대한', '관한', '따른', '의한', '위한', '통한', '기반한', '기초한',
      '외부'
    ]);

    const CONNECTORS = new Set(['및', '또는', '그리고']);
    // 제N(제1, 제2...) 수식어 패턴: 직후 명사는 서로 다른 구성요소로 취급
    const JE_PREFIX_RE = /^제[\d一二三四五六七八九十]+$|^제[일이삼사오육칠팔구십]+$/;

    // 토큰화 및 분석
    const rawTokens = text.split(/\s+/).filter(t => t.length > 0);
    const tokens = rawTokens.map(tok => {
      const cleaned = tok.replace(/[;,\.\?\!【】()\[\]]/g, '');
      // 복합 조사 처리: 두 번 strip (예: 로부터 → 로 → '', 에서부터 → 에서 → '')
      let base = stripParticle(cleaned);
      base = stripParticle(base);
      const hasParticle = base !== cleaned && cleaned.startsWith(base) && base.length > 0;
      const particle = hasParticle ? cleaned.slice(base.length) : '';
      const isSanggi = base === '상기' || base === '해당';
      const isConnector = CONNECTORS.has(base);
      const isJePrefix = JE_PREFIX_RE.test(base);
      return { tok, base, hasParticle, particle, isSanggi, isConnector, isJePrefix };
    });

    // 동사 어미가 조사로 잘못 인식되는 패턴 (체인 차단 금지)
    // 예: '만족하는' → base='만족하', particle='는' → 조사가 아니라 동사 어미
    const VERB_PARTICLE_RE = /(?:하는|하여|하고|하거나|되는|되어|되고|하며|위한|통한|의한|기반한|기초한|만족하|충족하|포함하|수행하|이용하|활용하|기반하)$/;

    // 상기가 직전 토큰뿐 아니라 분사·소유격('의') 체인을 거슬러 최대 12토큰까지 탐색
    function checkHasSanggi(pos) {
      for (let back = 1; back <= 12 && pos - back >= 0; back++) {
        const prev = tokens[pos - back];
        if (prev.isSanggi) return true;
        if (prev.isConnector) return false;
        if (prev.hasParticle && prev.particle !== '의') {
          // 동사 어미가 조사로 잘못 인식된 경우 → 차단하지 않고 계속 진행
          const fullWord = prev.base + prev.particle;
          if (VERB_PARTICLE_RE.test(fullWord)) continue;
          return false;
        }
        if (!prev.base || !/^[가-힣0-9]+$/.test(prev.base)) return false;
      }
      return false;
    }

    // 명사구 수집: Map<normalized, [{tokenPos, hasSanggi}]>
    const occMap = new Map();

    let i = 0;
    while (i < tokens.length) {
      const t = tokens[i];

      if (t.isSanggi || t.isConnector) { i++; continue; }
      if (!t.base || t.base.length < 2 || !/^[가-힣]+$/.test(t.base)) { i++; continue; }

      // 제N(제1, 제2...) 직후 명사는 서로 다른 구성요소 → skip
      const prevIsJe = i > 0 && tokens[i - 1].isJePrefix;
      if (prevIsJe) { i++; continue; }

      const hasSanggi = checkHasSanggi(i);

      // Non-greedy: 모든 위치에서 모든 길이 기록 (greedy 금지 — 긴 복합명사에 흡수되지 않도록)
      for (let len = Math.min(5, tokens.length - i); len >= 1; len--) {
        const segment = tokens.slice(i, i + len);

        // 중간 토큰은 조사 없는 순수 명사여야 함
        const intermediates = segment.slice(0, -1);
        if (intermediates.some(s => s.hasParticle || s.isConnector || s.isSanggi)) continue;

        // 모든 base가 2글자 이상 한글이어야 함
        if (segment.some(s => !s.base || s.base.length < 2 || !/^[가-힣]+$/.test(s.base))) continue;

        const normalized = segment.map(s => s.base).join(' ');
        const lastToken = segment[segment.length - 1];

        // 불용어 체크
        if (segment.some(s => R7_STOP.has(s.base))) continue;

        // 동사형 체크 (모든 segment 토큰 대상 - 중간 동사형 3-gram 방지)
        if (segment.some(s => VERB_ENDS.test(s.base + s.particle))) continue;

        // 마지막 토큰이 조사를 가지거나 문장 끝이거나 다음 토큰이 접속사(및/또는)인 경우 유효
        // → 'X 및 Y 중 적어도 하나를' 패턴에서 X도 정상 추적
        const nextIsConnector = i + len < tokens.length && tokens[i + len].isConnector;
        if (!lastToken.hasParticle && i + len < tokens.length && !nextIsConnector) continue;

        if (!occMap.has(normalized)) occMap.set(normalized, []);
        occMap.get(normalized).push({ tokenPos: i, hasSanggi });
        // 모든 길이 기록 (greedy break 금지)
      }

      i++;
    }

    // 하위 용어(sub-term) 판별 함수
    function isSubterm(shorter, longer) {
      if (shorter === longer) return false;
      const sW = shorter.split(' '), lW = longer.split(' ');
      if (sW.length >= lW.length) return false;
      for (let i = 0; i <= lW.length - sW.length; i++) {
        if (lW.slice(i, i + sW.length).join(' ') === shorter) return true;
      }
      return false;
    }

    // '하나의 X', '어느 X', '각 X' 등 수량 한정어 집합
    const QUANTIFIER_BASES = new Set(['하나', '어느', '각', '임의']);

    // 상기 없이 2회 이상 등장하는 용어 수집
    // 단, 아래 두 경우는 제외:
    //   ① 더 긴 복합 용어의 유일한 첫 도입 위치에 해당하는 출현
    //   ② '상기 X 중 ... 하나의 X' 처럼 앞서 상기로 수식된 X의 부분 선택 출현
    const PLURAL_INTRO_BASES = new Set(['복수', '다수', '여러', '다양', '각종']);
    const pluralIntroSuppressed = new Set();
    const r7Candidates = [];
    for (const [term, occs] of occMap) {
      const termWords = term.split(' ');
      const plainOccs = occs.filter(o => {
        if (o.hasSanggi) return false;

        // ① 복합 용어 첫 도입 위치 제외
        for (const [longerTerm, longerOccs] of occMap) {
          if (!isSubterm(term, longerTerm)) continue;
          const longerWords = longerTerm.split(' ');
          const longerPlain = longerOccs.filter(lo => !lo.hasSanggi);
          if (longerPlain.length === 1) {
            const lp = longerPlain[0];
            for (let offset = 0; offset <= longerWords.length - termWords.length; offset++) {
              if (longerWords.slice(offset, offset + termWords.length).join(' ') === term
                  && o.tokenPos === lp.tokenPos + offset) {
                return false;
              }
            }
          }
        }

        // ② '하나의/어느/각 X' 패턴 — 앞서 상기 X가 있으면 상기 범위 내로 간주
        for (let back = 1; back <= 3 && o.tokenPos - back >= 0; back++) {
          if (QUANTIFIER_BASES.has(tokens[o.tokenPos - back].base)) {
            const hasPriorSanggi = occs.some(o2 => o2.hasSanggi && o2.tokenPos < o.tokenPos);
            if (hasPriorSanggi) return false;
            break;
          }
        }

        return true;
      });
      // 제N 수식 복합명사 내 하위 용어 출현 제외
      // 예) '제1 배송 이벤트', '제2 배송 이벤트' → '이벤트'는 서로 다른 구성요소이므로 R7 오탐 방지
      const effectivePlainOccs = plainOccs.filter(o => {
        for (let back = 1; back <= 5 && o.tokenPos - back >= 0; back++) {
          const prev = tokens[o.tokenPos - back];
          if (prev.isJePrefix) return false;
          if (prev.isConnector) break;
          if (prev.hasParticle && prev.particle !== '의') break;
        }
        return true;
      });
      if (effectivePlainOccs.length >= 2) {
        const CREATION_VERB_RE = /^(?:생성|추출|획득|산출|도출|제공|결정|판단|생산|출력|계산|전송|저장|구성|설정|선택|특정|분류|탐지|분석|측정|추정|평가|비교|연산)/;
        const sortedByPos = [...effectivePlainOccs].sort((a, b) => a.tokenPos - b.tokenPos);
        const nonFirstOccs = sortedByPos.slice(1);

        // ✅ 첫 도입이 '복수의/다수의' 등 복수 수식어인 경우 → R7 무시
        // 이유: '복수의 X'는 통째로 하나의 복합 명사이며, 이후 'X' 단독 사용은
        //        해당 집합의 개별 인스턴스 또는 새 생성물로 간주 → 상기 불필요
        // ※ pluralIntroSuppressed에 기록: 이 복합어의 부분 용어도 나중에 억제하기 위함
        const firstOcc = sortedByPos[0];
        const prevToken = firstOcc.tokenPos > 0 ? tokens[firstOcc.tokenPos - 1] : null;
        if (prevToken && PLURAL_INTRO_BASES.has(prevToken.base)) {
          pluralIntroSuppressed.add(term);
          continue;
        }

        // ✅ 첫 도입 이후의 모든 plain 출현이 전부 '새로 만드는' 문맥이면 → 완전 무시
        const nonFirstFlags = nonFirstOccs.map(o =>
          CREATION_VERB_RE.test(tokens[o.tokenPos + termWords.length]?.base || '')
        );
        if (nonFirstFlags.every(Boolean)) continue;
        const someCreation = nonFirstFlags.some(Boolean);
        r7Candidates.push({ term, severity: someCreation ? 'WARN' : 'ERROR' });
      }
    }

    const filtered = r7Candidates.filter(({ term }) =>
      !r7Candidates.some(({ term: other }) => isSubterm(term, other)) &&
      // ✅ '복수의 마케팅 시나리오'처럼 PLURAL_INTRO로 억제된 복합어의 부분 용어도 억제
      // 예: '마케팅 시나리오'가 억제됐으면, 부분 용어 '시나리오'도 함께 억제
      !Array.from(pluralIntroSuppressed).some(suppressed => isSubterm(term, suppressed))
    );

    for (const { term, severity } of filtered) {
      issues.push({
        code: 'R7_MISSING_SANGGI',
        severity,
        evidence: `'${term}' 앞에 '상기'가 누락됨 (이미 앞서 도입된 구성요소)`,
        suggestion: severity === 'WARN'
          ? `'${term}'이 새로 생성되는 요소라면 문제없습니다. 기존 요소를 참조한다면 '상기 ${term}'으로 수정하세요`
          : `두 번째 이후 사용 시 '상기 ${term}'으로 수정하세요`
      });
    }

    return issues;
  }

  function analyze(text){
    const claims = parseClaims(text);
    if(!claims.length) return {claims:[], totalErr:0, totalWarn:0, summary:"청구항 인식 실패"};

    // ✅ 중복 청구항 번호 검사
    const claimNumbers = new Map();  // 번호 -> 등장 횟수
    for(const c of claims){
      claimNumbers.set(c.no, (claimNumbers.get(c.no) || 0) + 1);
    }

    const depsMap = new Map();
    const subjects = new Map();
    const categories = new Map();

    for(const c of claims){
      const d = extractDeps(c.raw);
      depsMap.set(c.no, d);

      const s = extractSubject(c.raw);
      subjects.set(c.no, s);

      const cat = extractCategory(c.raw);
      categories.set(c.no, cat);
    }

    const results = [];
    for(const c of claims){
      const deps = depsMap.get(c.no) || [];
      const clos = closure(c.no, depsMap);
      const issues = [];
      const raw = c.raw;
      const mySubject = subjects.get(c.no);

      const tp = topParent(c.no, clos);

      // ✅ R1: 중복 청구항 번호 검사
      if(claimNumbers.get(c.no) > 1){
        issues.push({
          code:"R1_DUPLICATE_CLAIM_NUMBER",
          severity:"ERROR",
          evidence:`청구항 ${c.no}이(가) ${claimNumbers.get(c.no)}번 중복 등장`,
          suggestion:`청구항 번호를 고유하게 수정하세요 (예: 순차적으로 1, 2, 3, ...)`
        });
      }

      // ✅ R2: 존재하지 않는 청구항 인용 검사 + 역방향 인용 검사
      for(const refNo of deps){
        const refExists = claims.find(cl => cl.no === refNo);
        if(!refExists){
          issues.push({
            code:"R2_INVALID_REFERENCE",
            severity:"ERROR",
            evidence:`제${refNo}항을 인용하고 있으나, 제${refNo}항이 존재하지 않음`,
            suggestion:`청구항 번호를 확인하고 올바른 항을 인용하세요`
          });
        } else if(refNo >= c.no){
          // ✅ 역방향 인용 (자신 또는 뒤의 청구항 인용)
          issues.push({
            code:"R2_FORWARD_REFERENCE",
            severity:"ERROR",
            evidence:`제${refNo}항을 인용하고 있으나, 청구항은 앞의 청구항만 인용할 수 있음`,
            suggestion:`청구항 ${c.no}은 제${refNo}항보다 먼저 등장하므로 인용 불가능`
          });
        }
      }
      
      // ✅ INFO: 청구항 번호 건너뛰기 안내 (등록청구항에서는 정상)
      if(c.no > 1){
        const prevClaimNo = c.no - 1;
        const prevExists = claims.find(cl => cl.no === prevClaimNo);
        if(!prevExists){
          issues.push({
            code:"INFO_CLAIM_NUMBER_GAP",
            severity:"INFO",
            evidence:`청구항 ${prevClaimNo}이(가) 누락되어 번호가 ${prevClaimNo} → ${c.no}로 건너뜀`,
            suggestion:`등록청구항에서는 정상적인 경우입니다. 출원청구항이라면 번호 순서를 확인하세요.`
          });
        }
      }

      // ✅ R4: 중복 단어 검사 (연속된 동일 단어)
      const duplicatePattern = /([가-힣]{2,})\s+\1\b/g;
      let dupMatch;
      while((dupMatch = duplicatePattern.exec(raw)) !== null){
        issues.push({
          code:"R4_DUPLICATE_WORD",
          severity:"ERROR",
          evidence:`중복 단어 발견: "${dupMatch[1]} ${dupMatch[1]}"`,
          suggestion:`중복된 "${dupMatch[1]}" 단어를 제거하세요`
        });
      }

      if(deps.length>0){
        // 종속항의 경우
        
        // ✅ 스코프는 인용항들만 포함 (현재 청구항 제외!)
        let scopeText = "";
        for(const refNo of clos){
          const refClaim = claims.find(x=>x.no===refNo);
          if(refClaim) scopeText += refClaim.raw + "\n";
        }
        
        // ✅ R1_CROSS: 비활성화
        // "예약 가능 영역"을 "예약", "가능", "영역"으로 쪼개는 문제로 인해
        // false positive가 너무 많이 발생하므로 비활성화
        // 한국어의 복합 명사구를 정확히 인식하는 것은 형태소 분석기 없이는 불가능
        
        const refs = extractDeicticRefs(raw);
        for(const r of refs){
          // cleanTarget이 있으면 사용, 없으면 target 사용 (하위 호환)
          const targetToCheck = r.cleanTarget || r.target;
          
          if(isInsideSubject(targetToCheck, mySubject)) continue;
          
          // ✅ 전체 명사구가 스코프 또는 현재 청구항 앞부분에 있는지 확인
          // 1. 인용항 스코프에서 확인
          let fullPhraseExists = scopeText.includes(targetToCheck);
          
          // 2. 스코프에 없으면 현재 청구항 앞부분에서 확인
          if(!fullPhraseExists){
            const deicticPos = r.position || raw.indexOf(r.evidence); // position 우선 사용
            const beforeText = raw.substring(0, deicticPos);
            fullPhraseExists = beforeText.includes(targetToCheck);
          }
          
          // ✅ 'X 결과' 패턴: 'X'가 스코프/앞부분에 도입됐으면 OK
          if (!fullPhraseExists) {
            const RESULT_SUFFIX = new Set(['결과', '결과물', '출력', '산출물']);
            const ctArr = targetToCheck.split(' ');
            if (ctArr.length >= 2 && RESULT_SUFFIX.has(ctArr[ctArr.length - 1])) {
              const withoutSuffix = ctArr.slice(0, -1).join(' ');
              if (scopeText.includes(withoutSuffix)) fullPhraseExists = true;
              if (!fullPhraseExists) {
                const deicticPos2 = r.position || raw.indexOf(r.evidence);
                const beforeText2 = raw.substring(0, deicticPos2);
                if (beforeText2.includes(withoutSuffix)) fullPhraseExists = true;
              }
            }
          }

          // ✅ 'BASE POSITIONAL' 패턴: BASE가 스코프/앞부분에 도입됐으면 OK
          // 예) '수용함 내부', '수용함 외부', '측벽 사이' — '수용함', '측벽'이 도입됐으면 OK
          if (!fullPhraseExists) {
            const POSITIONAL_SUFFIXES = new Set(['내부', '외부', '사이', '내측', '외측', '중앙', '끝단', '상단', '하단', '측면', '주변', '주위']);
            const ctArr = targetToCheck.split(' ');
            if (ctArr.length >= 2 && POSITIONAL_SUFFIXES.has(ctArr[ctArr.length - 1])) {
              const baseNoun = ctArr.slice(0, -1).join(' ');
              if (scopeText.includes(baseNoun)) fullPhraseExists = true;
              if (!fullPhraseExists) {
                const deicticPos2 = r.position || raw.indexOf(r.evidence);
                const beforeText2 = raw.substring(0, deicticPos2);
                if (beforeText2.includes(baseNoun)) fullPhraseExists = true;
              }
            }
          }

          if(!fullPhraseExists){
            // 스코프와 현재 청구항 앞부분 모두에 없으면 ERROR
            issues.push({
              code:"R6_DEICTIC_WITHOUT_ANTECEDENT",
              severity:"ERROR",
              evidence: r.evidence,
              suggestion: `인용항 또는 현재 청구항 앞부분에서 '${targetToCheck}' 전체를 먼저 도입하거나, '상기' 삭제`
            });
          }
        }
      } else {
        // 독립항의 경우 - 선행 도입 없이 '상기' 사용하는 경우 검사
        
        const refs = extractDeicticRefs(raw);
        for(const r of refs){
          // cleanTarget이 있으면 사용 (불용어 제거된 버전)
          const targetToCheck = r.cleanTarget || r.target;
          
          if(isInsideSubject(targetToCheck, mySubject)) continue;
          
          // 의미 있는 명사구가 없으면 (불용어만 있으면) 무시
          if(!targetToCheck || targetToCheck.length === 0) continue;
          
          // 해당 용어가 "상기" 없이 앞에서 먼저 등장했는지 확인
          const deicticPos = r.position || raw.indexOf(r.evidence); // position 우선 사용
          const beforeText = raw.substring(0, deicticPos);
          
          // ✅ 전체 명사구가 앞에 있는지 확인 (엄격)
          let fullPhraseExists = beforeText.includes(targetToCheck);

          // ✅ 'X 결과' 패턴: 'X'가 앞에 도입됐으면 OK ('상기 마케팅 시뮬레이션 결과에 따른' 등)
          if (!fullPhraseExists) {
            const RESULT_SUFFIX = new Set(['결과', '결과물', '출력', '산출물']);
            const ctArr = targetToCheck.split(' ');
            if (ctArr.length >= 2 && RESULT_SUFFIX.has(ctArr[ctArr.length - 1])) {
              const withoutSuffix = ctArr.slice(0, -1).join(' ');
              if (beforeText.includes(withoutSuffix)) fullPhraseExists = true;
            }
          }

          // ✅ 'BASE POSITIONAL' 패턴: BASE가 앞에 도입됐으면 OK
          // 예) '수용함 내부', '수용함 외부', '측벽 사이' — '수용함', '측벽'이 도입됐으면 OK
          if (!fullPhraseExists) {
            const POSITIONAL_SUFFIXES = new Set(['내부', '외부', '사이', '내측', '외측', '중앙', '끝단', '상단', '하단', '측면', '주변', '주위']);
            const ctArr = targetToCheck.split(' ');
            if (ctArr.length >= 2 && POSITIONAL_SUFFIXES.has(ctArr[ctArr.length - 1])) {
              const baseNoun = ctArr.slice(0, -1).join(' ');
              if (beforeText.includes(baseNoun)) fullPhraseExists = true;
            }
          }

          if(!fullPhraseExists){
            // 전체 명사구가 앞에 없으면 ERROR
            issues.push({
              code:"R6_DEICTIC_WITHOUT_ANTECEDENT",
              severity:"ERROR",
              evidence: r.evidence,
              suggestion: `독립항에서 '${targetToCheck}' 전체를 '상기' 없이 먼저 도입한 후 사용하거나, '상기'를 제거하세요`
            });
          }
        }
      }

      // R5
      if(tp !== null && tp !== c.no){
        const base = subjects.get(tp);
        const cur  = subjects.get(c.no);
        if(base && cur){
          const nb = normMin(base), nc = normMin(cur);
          if(nb !== nc && !nb.endsWith(nc) && !nc.endsWith(nb)){
            issues.push({
              code:"R5_INVENTION_SUBJECT_MISMATCH_STRICT",
              severity:"ERROR",
              evidence:`청구항 끝 문구 불일치`,
              baseSubject: base,  // 기준항 대상
              currentSubject: cur,  // 현재항 대상
              baseClaimNo: tp,  // 기준항 번호
              suggestion:"종속항 끝을 인용항과 동일하게 작성"
            });
          }
        }else if(!cur){
          issues.push({
            code:"R5_SUBJECT_NOT_FOUND",
            severity:"WARN",
            evidence:"청구항 끝 문구 누락",
            suggestion:"청구항 끝에 '방법', '장치', '시스템', '프로그램' 등의 발명 대상을 명시"
          });
        }
      }

      // R7: 앞서 도입된 구성요소에 '상기' 누락 검사
      for (const iss of checkMissingSanggi(raw)) {
        issues.push(iss);
      }

      results.push({
        no: c.no,
        deps,
        closure: clos,
        topParent: tp,
        subject: subjects.get(c.no),
        category: categories.get(c.no),
        issues
      });
    }

    const totalErr = results.reduce((a,r)=>a+r.issues.filter(x=>x.severity==="ERROR").length,0);
    const totalWarn = results.reduce((a,r)=>a+r.issues.filter(x=>x.severity==="WARN").length,0);
    const totalInfo = results.reduce((a,r)=>a+r.issues.filter(x=>x.severity==="INFO").length,0);
    return {claims: results, totalErr, totalWarn, totalInfo, summary: `청구항 ${results.length}개 · 오류 ${totalErr}건 · 경고 ${totalWarn}건${totalInfo > 0 ? ` · 안내 ${totalInfo}건` : ''}`};
  }
  return { analyze };
})();

document.getElementById('claimCheckBtn').addEventListener('click', runClaimCheck);

function runClaimCheck() {
  if (!segments.length) { alert('파일을 먼저 업로드해주세요.'); return; }

  const claimSegs = segments.filter(s => s.isClaim || (s.isHeader && /【청구항/.test(s.text)));
  if (!claimSegs.length) { alert('청구항 세그먼트를 찾을 수 없습니다.\n문서에 【청구항 N】 형식이 있는지 확인하세요.'); return; }

  const claimText = claimSegs.map(s => s.text).join('\n');
  try {
    const result = ClaimChecker.analyze(claimText);
    renderClaimResult(result);
  } catch (err) {
    document.getElementById('resultPlaceholder').style.display = 'none';
    resultContent.innerHTML = `<div class="msg-error">청구항 검사 오류: ${esc(err.message)}</div>`;
  }
}

function renderClaimResult(result) {
  document.getElementById('resultPlaceholder').style.display = 'none';
  document.getElementById('noTabTitle').style.display  = 'none';
  document.getElementById('tabBar').style.display      = 'flex';
  document.getElementById('tabReview').style.display   = '';
  document.getElementById('tabReview').classList.add('tab-active');
  document.getElementById('tabCorr').classList.remove('tab-active');
  document.getElementById('resultBtns').style.display  = 'flex';
  document.getElementById('corrBtns').style.display    = 'none';
  resultMarkdown = '';

  const allIssues = [];
  for (const claim of result.claims) {
    for (const issue of claim.issues) allIssues.push({ claimNo: claim.no, ...issue });
  }

  const errCount  = result.totalErr;
  const warnCount = result.totalWarn;
  const infoCount = result.totalInfo || 0;

  let html = `<div class="claim-summary">
    <span class="claim-summary-title">청구항 기재불비 검사 결과</span>
    <span>청구항 ${result.claims.length}개</span>
    <span class="claim-err">오류 ${errCount}건</span>
    <span class="claim-warn">경고 ${warnCount}건</span>
    ${infoCount > 0 ? `<span style="font-size:11px;color:var(--muted)">안내 ${infoCount}건</span>` : ''}
  </div>`;

  if (allIssues.length === 0) {
    html += `<div style="text-align:center;padding:60px;color:#16a34a;font-size:14px;font-weight:700">✓ 기재불비 항목이 발견되지 않았습니다</div>`;
  } else {
    const SEV_LABEL = { ERROR: '오류', WARN: '경고', INFO: '안내' };
    const SEV_COLOR = { ERROR: '#dc2626', WARN: '#d97706', INFO: '#6b7280' };
    html += `<table>
      <thead><tr><th>#</th><th>청구항</th><th>규칙</th><th>심각도</th><th>내용</th><th>제안</th></tr></thead>
      <tbody>`;
    allIssues.forEach((issue, i) => {
      const sev = issue.severity || 'INFO';
      html += `<tr>
        <td style="text-align:center;color:var(--muted);font-size:10px">${i + 1}</td>
        <td style="white-space:nowrap;font-weight:700;color:#7c3aed">청구항 ${issue.claimNo}</td>
        <td style="font-family:monospace;font-size:10px;color:var(--muted)">${esc(issue.code)}</td>
        <td style="font-weight:700;color:${SEV_COLOR[sev]}">${SEV_LABEL[sev]}</td>
        <td>${issue.code === "R5_INVENTION_SUBJECT_MISMATCH_STRICT" && issue.baseSubject ? `청구항 끝 문구 불일치: 기준항(제${esc(String(issue.baseClaimNo))}항) "<b>${esc(issue.baseSubject)}</b>" vs 현재항 "<b>${esc(issue.currentSubject)}</b>"` : esc(issue.evidence)}</td>
        <td style="color:var(--muted);font-size:11px">${esc(issue.suggestion || '')}</td>
      </tr>`;
    });
    html += `</tbody></table>`;
  }

  resultContent.innerHTML = html;

  const badge = document.getElementById('countBadge');
  if (allIssues.length > 0) {
    badge.textContent = `총 ${allIssues.length}건`;
    badge.style.display = 'inline-block';
  } else {
    badge.style.display = 'none';
  }
}

//  수정 테이블 파싱 — 검수 결과 HTML에서 추출
// ══════════════════════════════════════════════
function parseCorrectionTable(container) {
  const result = [];
  container.querySelectorAll('table').forEach(table => {
    const headRow = table.querySelector('thead tr');
    if (!headRow) return;
    const headers = Array.from(headRow.querySelectorAll('th')).map(th => th.textContent.trim());
    const findCol = (...names) => {
      for (const name of names) {
        const idx = headers.findIndex(h => h.includes(name));
        if (idx >= 0) return idx;
      }
      return -1;
    };
    const colPos  = findCol('위치');
    const colOrig = findCol('원문', '원본');
    const colSugg = findCol('수정제안', '수정안', '수정');
    const colReas = findCol('근거', '이유', '사유');
    // 최소한 원문 또는 수정제안 컬럼이 있으면 처리
    if (colOrig < 0 && colSugg < 0) return;
    table.querySelectorAll('tbody tr').forEach(tr => {
      const tds  = Array.from(tr.querySelectorAll('td'));
      if (!tds.length) return;   // 완전히 빈 행만 제외
      const get  = idx => (idx >= 0 && idx < tds.length) ? tds[idx].textContent.trim() : '';
      const orig = get(colOrig);
      const sugg = get(colSugg) || orig;  // 수정제안 없으면 원문 그대로
      result.push({
        segId:       get(colPos),
        original:    orig,
        suggestion:  sugg,
        rationale:   get(colReas),
        useOriginal: false,   // 기본: 수정본 사용
      });
    });
  });
  return result;
}

// ══════════════════════════════════════════════
//  단어 단위 LCS diff
// ══════════════════════════════════════════════
function wordDiff(origText, corrText) {
  const tok = t => (t.match(/[가-힣]+|[a-zA-Z0-9]+|[^\w가-힣\s]|\s+/g) || []);
  const A = tok(origText), B = tok(corrText);
  const m = A.length, n = B.length;
  // LCS DP (Uint16Array: 최대 65535 토큰 처리)
  const dp = Array.from({ length: m + 1 }, () => new Uint16Array(n + 1));
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = A[i-1] === B[j-1] ? dp[i-1][j-1] + 1 : Math.max(dp[i-1][j], dp[i][j-1]);
  // Traceback
  const dA = [], dB = [];
  let i = m, j = n;
  while (i > 0 || j > 0) {
    if (i > 0 && j > 0 && A[i-1] === B[j-1]) {
      dA.unshift({ t: A[i-1], k: 'eq' }); dB.unshift({ t: B[j-1], k: 'eq' }); i--; j--;
    } else if (j > 0 && (i === 0 || dp[i][j-1] >= dp[i-1][j])) {
      dB.unshift({ t: B[j-1], k: 'add' }); j--;
    } else {
      dA.unshift({ t: A[i-1], k: 'del' }); i--;
    }
  }
  const toH = (arr, dc, ac) => arr.map(({ t, k }) =>
    k === 'del' ? `<span class="${dc}">${esc(t)}</span>` :
    k === 'add' ? `<span class="${ac}">${esc(t)}</span>` : esc(t)
  ).join('');
  return {
    origHtml: toH(dA, 'diff-del', ''),
    corrHtml: toH(dB, '', 'diff-add'),
  };
}

//  수정 패널 렌더링
// ══════════════════════════════════════════════
function toggleUseOrig(idx) {
  const c = corrections[idx];
  c.useOriginal = !c.useOriginal;
  const row = document.getElementById(`corr-row-${idx}`);
  const btn = document.getElementById(`corr-toggle-${idx}`);
  if (c.useOriginal) {
    row.classList.add('use-orig');
    btn.textContent = '원문 사용';
    btn.className   = 'toggle-orig';
  } else {
    row.classList.remove('use-orig');
    btn.textContent = '✓ 수정본';
    btn.className   = 'toggle-sugg';
  }
}

function renderCorrectionPanel() {
  const appliedCount = corrections.filter(c => !c.useOriginal).length;
  let html = `
    <div class="corr-header">
      <span style="font-weight:700;color:#0369a1">✏️ 수정 패널</span>
      <span id="corrAppliedCount">${appliedCount}건 적용 / ${corrections.length}건</span>
      <span style="font-size:11px;color:var(--muted);margin-left:auto">수정안 셀 클릭 → 직접 편집 (Enter 확정) · 토글로 원문/수정본 선택</span>
    </div>
    <div class="corr-wrap">
      <table class="corr-table">
        <thead><tr>
          <th class="col-no">#</th>
          <th class="col-orig">원문</th>
          <th class="col-sugg">수정안</th>
          <th class="col-toggle">적용</th>
          <th class="col-reason">수정 근거</th>
        </tr></thead>
        <tbody>`;
  corrections.forEach((c, i) => {
    const diff      = wordDiff(c.original, c.suggestion);
    const rowClass  = c.useOriginal ? ' class="use-orig"' : '';
    const btnClass  = c.useOriginal ? 'toggle-orig' : 'toggle-sugg';
    const btnLabel  = c.useOriginal ? '원문 사용'   : '✓ 수정본';
    html += `<tr id="corr-row-${i}"${rowClass}>
      <td class="col-no">${i + 1}</td>
      <td class="col-orig" id="corr-orig-${i}">${diff.origHtml}</td>
      <td class="col-sugg"><div class="corr-sugg-text" contenteditable="true" data-idx="${i}">${diff.corrHtml}</div></td>
      <td class="col-toggle"><span class="${btnClass}" id="corr-toggle-${i}" onclick="toggleUseOrig(${i})">${btnLabel}</span></td>
      <td class="col-reason">${esc(c.rationale)}</td>
    </tr>`;
  });
  html += `</tbody></table></div>`;
  resultContent.innerHTML = html;

  // 편집 이벤트 바인딩
  resultContent.querySelectorAll('.corr-sugg-text[contenteditable]').forEach(cell => {
    cell.addEventListener('focus', function () {
      const idx = parseInt(this.dataset.idx);
      this.textContent = corrections[idx].suggestion;
      const range = document.createRange();
      range.selectNodeContents(this);
      range.collapse(false);
      window.getSelection().removeAllRanges();
      window.getSelection().addRange(range);
    });
    cell.addEventListener('blur', function () {
      const idx = parseInt(this.dataset.idx);
      corrections[idx].suggestion = this.textContent.replace(/\n/g, ' ').trim();
      const diff = wordDiff(corrections[idx].original, corrections[idx].suggestion);
      const origTd = document.getElementById(`corr-orig-${idx}`);
      if (origTd) origTd.innerHTML = diff.origHtml;
      this.innerHTML = diff.corrHtml;
      const ac = document.getElementById('corrAppliedCount');
      if (ac) ac.textContent = `${corrections.filter(c=>!c.useOriginal).length}건 적용 / ${corrections.length}건`;
    });
    cell.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') { e.preventDefault(); this.blur(); }
    });
  });
}
